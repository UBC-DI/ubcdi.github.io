<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Université UBC-DI - Accueil</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Google Fonts pour style pro -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* Reset de base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; scroll-behavior: smooth; }

        /* Menu fixe */
        nav {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.7);
            padding: 15px 0;
            z-index: 1000;
        }
        nav ul { list-style: none; display: flex; justify-content: center; }
        nav ul li { margin: 0 20px; }
        nav ul li a { color: white; text-decoration: none; font-weight: bold; font-size: 1.1em; }
        nav ul li a:hover { text-decoration: underline; }

        /* Hero section */
        #home {
            height: 100vh;
            background: url('campus.png') no-repeat center center/cover;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }
        #home::before {
            content: "";
            position: absolute;
            top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.5); /* fondu sombre pour lisibilité */
        }
        #home .content {
            position: relative;
            max-width: 900px;
            z-index: 1;
        }
        #home h1 { font-size: 3em; margin-bottom: 20px; }
        #home p { font-size: 1.5em; min-height: 50px; margin-bottom: 30px; }

        /* Boutons */
        .btn {
            display: inline-block;
            padding: 12px 25px;
            margin: 10px;
            font-size: 1.1em;
            color: white;
            background-color: #0056b3;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #003d80; }

    </style>
</head>
<body>

    <!-- Menu -->
    <nav>
        <ul>
            <li><a href="#home">Accueil</a></li>
            <li><a href="#about">À propos</a></li>
            <li><a href="#programs">Organisation académique</a></li>
            <li><a href="#news">Actualités</a></li>
            <li><a href="#admission">Inscriptions</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section id="home">
        <div class="content">
            <h1>Université des Bâtisseurs du Congo</h1>
            <p id="animated-text"></p>
            <a href="#about" class="btn">Découvrir l'université</a>
            <a href="#news" class="btn"> Nos actualités</a>
        </div>
    </section>

    <!-- Sections exemple (À propos) pour scroll -->
    <section id="about" style="height:100vh; display:flex; align-items:center; justify-content:center; text-align:center;">
        <div>
            <h2>À propos de nous</h2>
            <p>Notre mission est de former des leaders pour le développement et l’innovation au Congo.</p>
        </div>
    </section>

    <script>
const messages = [
    "Bienvenue à l’Université UBC-DI",
    "Excellence - Innovation - Développement",
    "Former les bâtisseurs de demain",
    "Savoir pour Agir, Bâtir pour Servir"
];

let i = 0;
let j = 0;
let currentText = "";
let isDeleting = false;

const speed = 180;        // vitesse écriture (plus lent)
const eraseSpeed = 100;   // vitesse effacement
const pauseTime = 2000;   // pause quand texte complet

function type() {
    const fullText = messages[i];

    if (!isDeleting) {
        currentText = fullText.substring(0, j + 1);
        j++;
    } else {
        currentText = fullText.substring(0, j - 1);
        j--;
    }

    document.getElementById("animated-text").textContent = currentText;

    let timeout = speed;

    // Quand le texte est complet
    if (!isDeleting && j === fullText.length) {
        timeout = pauseTime; // pause
        isDeleting = true;
    }
    // Quand tout est effacé
    else if (isDeleting && j === 0) {
        isDeleting = false;
        i = (i + 1) % messages.length;
        timeout = 500; // petite pause avant nouveau texte
    }
    // Vitesse différente pour effacement
    else if (isDeleting) {
        timeout = eraseSpeed;
    }

    setTimeout(type, timeout);
}

type();
</script>

</body>
</html>
